<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Your Trips - Tourism Website</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/pages/booking.css">
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/>
                <circle cx="12" cy="10" r="3"/>
            </svg>
            Tourism
        </a>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="search.html">Explore</a>
            <a href="booking.html" class="active">Book</a>

            <div class="currency-selector" id="currencyContainer">
                <span class="currency-icon">💱</span>
                <select id="globalCurrencySelect" onchange="handleCurrencyChange(this.value)">
                    <option value="USD">USD</option>
                    <option value="EGP">EGP</option>
                    <option value="EUR">EUR</option>
                    <option value="GBP">GBP</option>
                    <option value="AED">AED</option>
                    <option value="SAR">SAR</option>
                </select>
            </div>

            <a href="login.html" class="nav-cta">Sign in</a>
        </div>

        <button class="nav-hamburger" id="navHamburger" aria-label="Toggle menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </nav>

    <div class="container">
        <div class="header-section">
            <h1 style="font-family: 'Sora';">Manage your trips</h1>
            <p>Track your bookings and saved destinations.</p>
        </div>

        <div class="tabs-container">
            <button class="tab-btn active" onclick="openTab(event, 'booked-section')">My Bookings</button>
            <button class="tab-btn" onclick="openTab(event, 'saved-section')">Saved Items</button>
        </div>

        <div id="booked-section" class="tab-content active"></div>
        <div id="saved-section" class="tab-content"></div>
    </div>

    <div id="modal-overlay" class="custom-modal-overlay">
        <div class="custom-modal">
            <h2 id="modal-title" style="font-family: 'Sora';">Success</h2>
            <p id="modal-text">Action completed successfully.</p>
            <button class="confirm-btn" onclick="closeModal()">حسناً</button>
        </div>
    </div>

    <footer class="footer">
        <p>©️ 2026 Tourism Website - University Project</p>
    </footer>

    <script src="../js/data.js"></script>
    <script src="../js/currency.js"></script>
    <script src="../js/booking.js"></script>
    <script src="../js/ui.js"></script>

    <script>
        function openTab(evt, sectionId) {
            const contents = document.querySelectorAll(".tab-content");
            contents.forEach(c => c.classList.remove("active"));

            const buttons = document.querySelectorAll(".tab-btn");
            buttons.forEach(b => b.classList.remove("active"));

            document.getElementById(sectionId).classList.add("active");
            evt.currentTarget.classList.add("active");
        }
    </script>

</body>
</html>
