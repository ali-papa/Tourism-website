<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Tourism</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/pages/register.css">

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="index.html" class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/>
      <circle cx="12" cy="10" r="3"/>
    </svg>
    Tourism
  </a>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="search.html">Explore</a>
    <a href="booking.html">Book</a>
    <a href="login.html">Sign in</a>
  </div>
</nav>

<!-- CONTENT -->
<div class="container">
  <div class="auth-wrapper">

    <div class="auth-box">
      <h2>Create Account</h2>

      <form id="registerForm" novalidate>

        <div class="name-row">
          <div>
            <input type="text" id="firstName" placeholder="First Name">
            <div class="field-error" id="err-firstName">Letters only, min 2.</div>
          </div>
          <div>
            <input type="text" id="lastName" placeholder="Last Name">
            <div class="field-error" id="err-lastName">Letters only, min 2.</div>
          </div>
        </div>

        <input type="email" id="email" placeholder="Enter your email">
        <div class="field-error" id="err-email">Enter a valid email.</div>

        <div class="pw-wrap">
          <input type="password" id="password" placeholder="Enter password" oninput="checkStrength(this.value)">
          <button type="button" class="pw-toggle" onclick="togglePw('password', this)">👁</button>
        </div>

        <div class="strength-bar">
          <div class="s-seg" id="s1"></div>
          <div class="s-seg" id="s2"></div>
          <div class="s-seg" id="s3"></div>
          <div class="s-seg" id="s4"></div>
        </div>
        <div class="s-label" id="s-label"></div>
        <div class="field-error" id="err-password">Min. 6 characters.</div>

        <div class="pw-wrap">
          <input type="password" id="confirmPassword" placeholder="Confirm password">
          <button type="button" class="pw-toggle" onclick="togglePw('confirmPassword', this)">👁</button>
        </div>
        <div class="field-error" id="err-confirmPassword">Passwords do not match.</div>

        <button type="submit">Register</button>

        <p class="auth-footer">
          Already have an account?
          <a href="login.html">Login</a>
        </p>

      </form>

      <p id="error"></p>
    </div>

  </div>
</div>

<!-- FOOTER -->
<footer class="footer">
  <p>© 2026 Tourism Website</p>
</footer>

<script src="../js/users.js"></script>
<script src="../js/register.js"></script>
<script src="../js/ui.js"></script>

<div id="toast" class="toast"></div>

</body>
</html>
