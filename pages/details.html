<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- Apply stored theme and language settings immediately to prevent flash -->
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        // Apply text direction and language attribute before stylesheets load to prevent flash of wrong direction
        const savedLang = localStorage.getItem('lang') || 'en';
        document.documentElement.setAttribute('dir', savedLang === 'ar' ? 'rtl' : 'ltr');
        document.documentElement.setAttribute('lang', savedLang);
    </script>
    
    <title>Destination Details</title>
    <!-- Preconnect to Google Fonts for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Primary and secondary font families -->
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- Core and component styles -->
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/layout.css">

    <!-- Theme stylesheets (light/dark) -->
    <link rel="stylesheet" href="../css/themes/light.css">
    <link rel="stylesheet" href="../css/themes/dark.css">

    <!-- Page-specific styles for details page -->
    <link rel="stylesheet" href="../css/pages/details.css">

    <!-- Font Awesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Responsive design adjustments -->
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/rtl.css">
</head>

<body>

    <!-- Site navigation bar -->
    <nav class="navbar">
    <a href="index.html" class="logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/>
            <circle cx="12" cy="10" r="3"/>
        </svg>
        Tourism
    </a>
    <div class="nav-links">
        <a href="index.html" data-lang="home">Home</a>
        <a href="search.html" data-lang="explore">Explore</a>
        <a href="booking.html" data-lang="book">Book</a>

        <!-- Currency Selector -->
        <div class="currency-selector" id="currencyContainer">
            <span class="currency-icon">💱</span>
            <select id="globalCurrencySelect" onchange="handleCurrencyChange(this.value)">
                <option value="USD">USD</option>
                <option value="EGP">EGP</option>
                <option value="EUR">EUR</option>
                <option value="GBP">GBP</option>
                <option value="AED">AED</option>
                <option value="SAR">SAR</option>
            </select>
        </div>

            <!-- Language toggle (English / Arabic) -->
            <button class="lang-toggle-btn" id="langToggle" aria-label="Toggle language">AR</button>
            
            <!-- Theme toggle (light / dark) -->
            <button class="theme-toggle-btn" id="themeToggle" aria-label="Toggle theme"></button>

            <!-- Call-to-action sign in button -->
            <a href="login.html" class="nav-cta" data-lang="signin">Sign in</a>
    </div>

    <button class="nav-hamburger" id="navHamburger" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
    </button>
</nav>

    <!-- MAIN -->
    <main class="details-page">
        <div class="container">
            
            <!-- Destination details will be injected here dynamically -->
            <div id="detailsContainer" class="details-container">
                <!-- content -->
            </div>

        </div>
    </main>

    <!-- Site footer -->
        <footer class="main-footer">
     <div class="footer-container">
        <div class="footer-section about">
            <h2 class="footer-logo">Tourism</h2>
            <p data-lang="footer_desc">Discover the world's most beautiful destinations with us. Your journey starts here.</p>
            <div class="social-links">
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
            </div>
        </div>

        <div class="footer-section links">
            <h3 data-lang="quick_links">Quick Links</h3>
            <ul>
                <li><a href="index.html" data-lang="home">Home</a></li>
                <li><a href="search.html" data-lang="explore">Explore</a></li>
                <li><a href="booking.html" data-lang="book_now_footer">Book Now</a></li>
            </ul>
        </div>

        <div class="footer-section contact">
            <h3 data-lang="contact_us">Contact Us</h3>
            <p><i class="fas fa-envelope"></i> support@tourism.com</p>
            <p><i class="fas fa-phone"></i> +20 123 456 789</p>
        </div>
    </div>

    <div class="footer-bottom" data-lang="footer_rights">
        &copy; 2026 Tourism Website | Designed with ❤️
    </div>
    </footer>

    <!-- External JavaScript libraries and modules -->
    <script src="../js/data.js"></script>

    <script src="../js/details.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/translations.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/chat.js"></script>
</body>
</html>
