<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Tourism</title>
    <style>
        body {
            margin: 0;
            font-family: Georgia, serif;
            background-color: white;
        }

        /* HEADER */
        .header {
            background-color: #2e2e2e;
            color: white;
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h2 { margin: 0; font-size: 28px; }
        .header nav a {
            color: white;
            text-decoration: none;
            margin-left: 25px;
            font-size: 18px;
        }
        .header nav a:hover { text-decoration: underline; }

        /* CONTENT */
        .content {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 140px);
            padding: 20px;
        }

        /* PROFILE BOX */
        .profile-box {
            width: 380px;
            background: #f5f5f5;
            padding: 30px;
            border: 1px solid #ccc;
            border-radius: 10px;
            text-align: center;
        }

        .profile-box h3 {
            margin-top: 0;
            font-size: 24px;
            margin-bottom: 20px;
        }

        /* AVATAR */
        .avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #2e2e2e;
            color: white;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-family: Georgia, serif;
        }

        /* INFO ROWS */
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #ddd;
            font-size: 16px;
            text-align: left;
        }
        .info-row:last-of-type { border-bottom: none; }
        .info-label { color: #666; font-size: 14px; }
        .info-value { font-weight: bold; color: #2e2e2e; }

        /* CREDIT BADGE */
        .credit-badge {
            display: inline-block;
            background: #2e2e2e;
            color: white;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 15px;
            font-weight: bold;
        }

        /* BUTTON */
        .profile-box button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            border-radius: 6px;
            border: none;
            background: #2e2e2e;
            color: white;
            font-size: 16px;
            font-family: Georgia, serif;
            cursor: pointer;
        }
        .profile-box button:hover { background: #000; }

        /* FOOTER */
        .footer {
            background-color: #2e2e2e;
            color: white;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="header">
    <h2>Tourism</h2>
    <nav>
        <a href="index.html">Home</a>
        <a href="#" id="logoutBtn">Logout</a>
    </nav>
</div>

<div class="content">
    <div class="profile-box">
        <h3>Your Profile 👤</h3>

        <div class="avatar" id="avatar"></div>

        <div class="info-row">
            <span class="info-label">Full Name</span>
            <span class="info-value" id="name"></span>
        </div>
        <div class="info-row">
            <span class="info-label">Email</span>
            <span class="info-value" id="email"></span>
        </div>
        <div class="info-row">
            <span class="info-label">Credit</span>
            <span class="credit-badge" id="credit"></span>
        </div>

        <button id="logoutBtnMain">Logout</button>
    </div>
</div>

<div class="footer">© 2026 Tourism Website</div>

<script src="../js/users.js"></script>
<script>
    var user = getCurrentUser();

    // if not logged in → redirect to login
    if (!user) {
        window.location.href = 'login.html';
    } else {
        // avatar initials
        document.getElementById('avatar').textContent =
            user.firstName.charAt(0).toUpperCase() + user.lastName.charAt(0).toUpperCase();

        document.getElementById('name').textContent =
            user.firstName + ' ' + user.lastName;

        document.getElementById('email').textContent =
            user.email;

        document.getElementById('credit').textContent =
            user.credit + ' pts';
    }

    function logout() {
        logoutUser();
        window.location.href = 'login.html';
    }

    document.getElementById('logoutBtnMain').onclick = logout;
    document.getElementById('logoutBtn').onclick     = logout;
</script>

</body>
</html>
