<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - Tourism</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/pages/profile.css">
</head>

<body>

<!-- NAVBAR (موحد مع باقي الموقع) -->
<nav class="navbar">
  <a href="index.html" class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/>
      <circle cx="12" cy="10" r="3"/>
    </svg>
    Tourism
  </a>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="search.html">Explore</a>
    <a href="booking.html">Book</a>
    <a href="login.html" class="nav-cta">Sign in</a>
  </div>
</nav>

<!-- CONTENT -->
<div class="container">
  <div class="profile-card">

    <!-- HEADER -->
    <div class="profile-header">
      <div class="avatar" id="avatar"></div>
      <h2 id="name"></h2>
      <p id="email"></p>
    </div>

    <!-- BALANCE -->
    <div class="balance">
      <h3>Balance</h3>
      <p id="balance">$0</p>
      <button id="addBalanceBtn">Add Balance</button>
      <button id="settingsBtn" class="settings-btn">Settings</button>
    </div>

    <!-- INFO -->
    <div class="info">
      <p><strong>First Name:</strong> <span id="firstName"></span></p>
      <p><strong>Last Name:</strong> <span id="lastName"></span></p>
    </div>

    <button id="logoutBtn" class="logout">Logout</button>

  </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">

    <!-- زرار X -->
    <span class="modal-close" id="closeModal">&times;</span>

    <h3>Add Balance</h3>

    <input type="number" id="amount" placeholder="Enter amount">
    <button id="confirmAdd">Add</button>

  </div>
</div>

<div id="settingsModal" class="modal">
  <div class="modal-box">

    <!-- X -->
    <span class="modal-close" id="closeSettings">&times;</span>

    <h3>Update Profile</h3>

    <input id="newFirst" placeholder="First Name">
    <input id="newLast" placeholder="Last Name">

    <!-- 🔐 OLD PASSWORD -->
    <input id="oldPass" type="password" placeholder="Current Password">

    <!-- 🆕 NEW PASSWORD -->
    <input id="newPass" type="password" placeholder="New Password">

    <button id="saveSettings">Save</button>

  </div>
</div>

<!-- SCRIPTS -->
<script src="../js/users.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/profile.js"></script>
<div id="toast" class="toast"></div>

</body>
</html>
