<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Tourism</title>
    <style>
        body {
            margin: 0;
            font-family: Georgia, serif;
            background-color: white;
        }

        .header {
            background-color: #2e2e2e;
            color: white;
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h2 { margin: 0; font-size: 28px; }
        .header nav a {
            color: white;
            text-decoration: none;
            margin-left: 25px;
            font-size: 18px;
        }
        .header nav a:hover { text-decoration: underline; }

        .content {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 140px);
            padding: 20px;
        }

        .auth-box {
            width: 350px;
            background: #f5f5f5;
            padding: 25px;
            border: 1px solid #ccc;
            border-radius: 10px;
        }
        .auth-box h3 { margin-top: 0; font-size: 24px; margin-bottom: 15px; }

        .auth-box input {
            width: 100%;
            padding: 12px;
            margin: 8px 0 3px 0;
            font-size: 16px;
            border: 1px solid #aaa;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: Georgia, serif;
        }
        .auth-box input.input-error { border-color: #cc0000; }

        .auth-box button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: #2e2e2e;
            color: white;
            border: none;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            font-family: Georgia, serif;
            margin-top: 10px;
        }
        .auth-box button[type="submit"]:hover { background: #000; }

        /* PASSWORD TOGGLE */
        .pw-wrap { position: relative; }
        .pw-wrap input { padding-right: 44px; }
        .pw-toggle {
            position: absolute;
            right: 10px; top: 50%;
            transform: translateY(-70%);
            background: none; border: none;
            cursor: pointer; font-size: 16px;
            color: #666; padding: 0; width: auto;
        }
        .pw-toggle:hover { color: #000; }

        /* OPTIONS ROW */
        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0 4px;
            font-size: 14px;
        }
        .remember { display: flex; align-items: center; gap: 6px; cursor: pointer; color: #333; }
        .remember input[type="checkbox"] { width: auto; margin: 0; padding: 0; cursor: pointer; }
        .forgot { color: #2e2e2e; text-decoration: none; font-size: 14px; }
        .forgot:hover { text-decoration: underline; }

        /* ERRORS */
        .field-error { font-size: 12px; color: #cc0000; margin: 0 0 4px 2px; display: none; }
        .field-error.show { display: block; }

        #error { margin-top: 12px; font-size: 14px; display: none; }
        #error.show-error   { display: block; color: #cc0000; }
        #error.show-success { display: block; color: #2a7a2a; }

        .small { font-size: 14px; }

        .footer {
            background-color: #2e2e2e;
            color: white;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="header">
    <h2>Tourism</h2>
    <nav>
        <a href="index.html">Home</a>
        <a href="register.html">Register</a>
    </nav>
</div>

<div class="content">
    <div class="auth-box">
        <h3>Welcome Back </h3>

        <form id="loginForm" novalidate>

            <input type="email" id="email" placeholder="Enter your email">
            <div class="field-error" id="err-email">Enter a valid email.</div>

            <div class="pw-wrap">
                <input type="password" id="password" placeholder="Enter password">
                <button type="button" class="pw-toggle" onclick="togglePw('password', this)">👁</button>
            </div>
            <div class="field-error" id="err-password">Password is required.</div>

            <div class="options-row">
                <label class="remember">
                    <input type="checkbox" id="rememberMe"> Remember me
                </label>
                <a href="#" class="forgot">Forgot password?</a>
            </div>

            <button type="submit">Login</button>

            <p class="small">Don't have an account? <a href="register.html">Register</a></p>

        </form>

        <p id="error"></p>
    </div>
</div>

<div class="footer">© 2026 Tourism Website</div>

<script src="../js/users.js"></script>
<script>
    function togglePw(id, btn) {
        var inp = document.getElementById(id);
        inp.type = inp.type === 'password' ? 'text' : 'password';
        btn.style.color = inp.type === 'text' ? '#000' : '#666';
    }

    function setErr(id, show) {
        var inp = document.getElementById(id);
        var err = document.getElementById('err-' + id);
        if (inp) inp.classList.toggle('input-error', show);
        if (err) err.classList.toggle('show', show);
    }

    function showMsg(type, text) {
        var el = document.getElementById('error');
        el.className = type === 'success' ? 'show-success' : 'show-error';
        el.textContent = text;
    }

    var isValidEmail = function(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); };

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();

        var email    = document.getElementById('email').value.trim();
        var password = document.getElementById('password').value.trim();
        var remember = document.getElementById('rememberMe').checked;

        ['email','password'].forEach(function(id){ setErr(id, false); });
        var errEl = document.getElementById('error');
        errEl.className = '';
        errEl.textContent = '';

        var valid = true;
        if (!isValidEmail(email)) { setErr('email', true);    valid = false; }
        if (!password)            { setErr('password', true); valid = false; }
        if (!valid) return;

        var result = loginUser(email, password);

        if (!result.success) {
            showMsg('error', result.message || 'Wrong email or password.');
            return;
        }

        if (remember) {
            localStorage.setItem('rememberedEmail', email);
        } else {
            localStorage.removeItem('rememberedEmail');
        }

        showMsg('success', 'Logged in successfully  Redirecting…');
        setTimeout(function() { window.location.href = 'profile.html'; }, 800);
    });

    // pre-fill remembered email
    (function() {
        var saved = localStorage.getItem('rememberedEmail');
        if (saved) {
            document.getElementById('email').value = saved;
            document.getElementById('rememberMe').checked = true;
        }
    })();
</script>

</body>
</html>
